<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM VPN</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #0a0a0f;
  color: #e4e4e7;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
  -webkit-app-region: drag;
}
.container { text-align: center; padding: 40px; }
.logo { margin-bottom: 24px; }
.logo svg { width: 48px; height: 48px; }
.logo-text { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-top: 8px; }
.logo-text span { color: #c8a54e; }
.logo-text small { color: #52525b; font-weight: 400; margin-left: 4px; }
.status { margin-top: 32px; font-size: 13px; color: #a1a1aa; min-height: 20px; }
.progress-bar { margin-top: 20px; width: 280px; height: 3px; background: #1e1e26; border-radius: 2px; overflow: hidden; display: none; }
.progress-bar.active { display: block; }
.progress-fill { height: 100%; width: 0%; background: #c8a54e; border-radius: 2px; transition: width 0.3s ease; }
.progress-text { margin-top: 8px; font-size: 11px; color: #52525b; display: none; }
.progress-text.active { display: block; }
.spinner { margin: 20px auto 0; width: 20px; height: 20px; border: 2px solid #1e1e26; border-top-color: #c8a54e; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
.spinner.active { display: block; }
.error { margin-top: 20px; padding: 12px 20px; background: #2d1517; border: 1px solid #4a2022; border-radius: 8px; font-size: 12px; color: #ff6568; display: none; }
.error.active { display: block; }
.error .title { font-weight: 600; margin-bottom: 4px; }
.error .desc { color: #a1a1aa; font-size: 11px; }
.button { margin-top: 16px; padding: 8px 24px; background: #c8a54e; color: #09090b; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: none; -webkit-app-region: no-drag; }
.button.active { display: inline-block; }
.button:hover { background: #b8963e; }
.footer { position: fixed; bottom: 16px; font-size: 10px; color: #27272a; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#c8a54e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
    </svg>
    <div class="logo-text"><span>AURUM</span><small>VPN</small></div>
  </div>
  <div class="spinner active" id="spinner"></div>
  <div class="status" id="status">Starting...</div>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
  <div class="error" id="error">
    <div class="title" id="errorTitle">Something went wrong</div>
    <div class="desc" id="errorDesc"></div>
  </div>
  <button class="button" id="retryBtn">Retry</button>
  <button class="button" id="continueBtn" style="margin-left:8px">Continue Anyway</button>
</div>
<div class="footer">AURUM VPN v1.1.4</div>
<script>
  const api = window.electronAPI?.splash;
  const status = document.getElementById('status');
  const spinner = document.getElementById('spinner');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const error = document.getElementById('error');
  const errorTitle = document.getElementById('errorTitle');
  const errorDesc = document.getElementById('errorDesc');
  const retryBtn = document.getElementById('retryBtn');
  const continueBtn = document.getElementById('continueBtn');

  if (api) {
    api.onStatus((msg) => { status.textContent = msg; });
    api.onProgress((pct) => {
      progressBar.classList.add('active');
      progressFill.style.width = pct + '%';
      progressText.classList.add('active');
      progressText.textContent = pct + '%';
    });
    api.onError((title, desc) => {
      spinner.classList.remove('active');
      error.classList.add('active');
      errorTitle.textContent = title;
      errorDesc.textContent = desc;
      retryBtn.classList.add('active');
      continueBtn.classList.add('active');
    });
    api.onDone(() => {
      spinner.classList.remove('active');
      status.textContent = 'Launching...';
    });
    retryBtn.addEventListener('click', () => api.retry());
    continueBtn.addEventListener('click', () => api.continue());
  }
</script>
</body>
</html>
