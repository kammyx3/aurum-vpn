version: "3.8"

services:
  aurum-vpn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurum-vpn
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VPN_MODE=production
      - DATABASE_URL=file:./data/prod.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-aurum-admin-2024}
      - WG_INTERFACE=wg0
      - WG_ENDPOINT_HOST=${WG_ENDPOINT_HOST:-vpn.example.com}
      - WG_PORT=51820
      - WG_SUBNET=10.8.0.0/24
      - WG_DNS=1.1.1.1
      - WG_ALLOWED_IPS=0.0.0.0/0,::/0
      - NODE_ENV=production
    volumes:
      - vpn-data:/app/data
      - /etc/wireguard:/etc/wireguard:ro
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - vpn-network

networks:
  vpn-network:
    driver: bridge

volumes:
  vpn-data:
